services:
  gateway:
    build: ./services/gateway
    ports:
      - "8000:8000"
    volumes:
      - ./services/gateway:/app
    environment:
      - ENV=development
      - KCAL_SERVICE_URL=http://kcal:8001
    depends_on:
      - kcal

  kcal:
    build: ./services/kcal
    ports:
      - "8001:8001"
    volumes:
      - ./services/kcal:/app
    environment:
      - ENV=development